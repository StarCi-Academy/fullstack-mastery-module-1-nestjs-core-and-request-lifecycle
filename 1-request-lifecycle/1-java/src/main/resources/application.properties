# Cổng mặc định 3000; có thể override bằng -Dserver.port hoặc biến môi trường PORT.
# (EN: Default port 3000; overridable via -Dserver.port or the PORT env var.)
server.port=${PORT:3000}
# Tắt banner để log gọn khi quan sát vòng đời.
# (EN: Disable the banner for cleaner logs while observing the lifecycle.)
spring.main.banner-mode=off
