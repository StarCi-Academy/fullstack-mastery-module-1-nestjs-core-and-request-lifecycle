# Default config — port read from env PORT (default 3000) to match the cross-language API contract.
# Bind to loopback (127.0.0.1) so local testing never triggers an OS firewall prompt.
server:
  port: ${PORT:3000}
  address: ${HOST:127.0.0.1}
# Disable Spring's default whitelabel/stacktrace page so internal detail is never leaked to the client.
server.error.include-stacktrace: never
server.error.whitelabel.enabled: false
